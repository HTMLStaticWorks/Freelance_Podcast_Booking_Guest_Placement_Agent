<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PodLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#8b5cf6', secondary: '#ec4899', darkBg: '#0f172a' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-slate-50 dark:bg-darkBg min-h-screen flex flex-col items-center justify-center p-4 relative">

    <!-- Theme & RTL Toggles -->
    <div class="fixed top-6 right-6 flex items-center space-x-4 rtl:space-x-reverse z-50">
        <button id="themeToggle" class="p-3 bg-white dark:bg-slate-800 rounded-full shadow-lg hover:scale-110 transition-transform">
            <i class="fas fa-moon text-slate-600 dark:text-slate-300"></i>
        </button>
        <button id="rtlToggle" class="px-4 py-2 bg-white dark:bg-slate-800 rounded-full shadow-lg font-bold text-sm hover:scale-110 transition-transform">
            RTL
        </button>
    </div>

    <div class="w-full max-w-md reveal">
        <div class="glass-card p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white/20">
            <!-- Header Inside Card -->
            <div class="flex flex-col items-center text-center mb-10">
                <a href="../index.html" class="flex items-center space-x-3 group mb-6">
                    <img src="../podlink_logo_icon_1778567690962.png" alt="PodLink Logo" class="w-12 h-12 object-contain group-hover:rotate-12 transition-transform">
                    <span class="text-3xl font-bold gradient-text">PodLink</span>
                </a>
                <h2 class="text-3xl font-black mb-2 text-slate-900 dark:text-white">Welcome Back</h2>
                <p class="text-slate-500 dark:text-slate-400">Access your placement dashboard</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Email Address</label>
                    <input type="email" placeholder="name@company.com" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white">
                </div>
                <div class="flex items-center justify-between text-xs font-bold">
                    <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer group">
                        <input type="checkbox" class="rounded border-slate-300 text-primary focus:ring-primary">
                        <span class="text-slate-500 group-hover:text-primary transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-primary hover:text-secondary transition-colors">Forgot Password?</a>
                </div>
                <button type="button" onclick="location.href='dashboard.html'" class="w-full py-5 bg-primary text-white rounded-2xl font-bold shadow-xl shadow-primary/30 hover:bg-opacity-90 transition-all transform hover:scale-[1.01]">Login to Dashboard</button>
            </form>

            <div class="relative flex items-center justify-center my-8">
                <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
                <span class="flex-shrink mx-4 text-xs font-bold uppercase text-slate-400 tracking-widest">or login with social</span>
                <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button class="flex items-center justify-center p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all group">
                    <i class="fab fa-google text-xl text-red-500 group-hover:scale-110 transition-transform"></i>
                </button>
                <button class="flex items-center justify-center p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all group">
                    <i class="fab fa-facebook text-xl text-blue-600 group-hover:scale-110 transition-transform"></i>
                </button>
                <button class="flex items-center justify-center p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all group">
                    <i class="fab fa-apple text-xl text-black dark:text-white group-hover:scale-110 transition-transform"></i>
                </button>
            </div>

            <div class="mt-10 pt-10 border-t border-slate-200 dark:border-white/5 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">Don't have an account? <a href="signup.html" class="text-primary font-bold hover:underline">Sign Up Free</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        // RTL Toggle for Login Page specifically if main.js is not enough
        const rtlToggle = document.getElementById('rtlToggle');
        if (rtlToggle) {
            rtlToggle.addEventListener('click', () => {
                const isRtl = document.documentElement.getAttribute('dir') === 'rtl';
                document.documentElement.setAttribute('dir', isRtl ? 'ltr' : 'rtl');
            });
        }
    </script>
</body>
</html>
