<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | PodLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#8b5cf6', secondary: '#ec4899', darkBg: '#0f172a' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-slate-50 dark:bg-darkBg min-h-screen flex flex-col items-center justify-center p-4 relative">

    <!-- Utility Toggles Area -->
    <div class="w-full max-w-md flex justify-end mb-4 z-50">
        <div class="nav-utilities">
            <button id="themeToggle" class="utility-btn" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="rtlToggle" class="utility-btn" title="Toggle RTL">
                RTL
            </button>
        </div>
    </div>

    <div class="w-full max-w-2xl reveal">
        <div class="glass-card p-8 md:p-12 rounded-[3rem] shadow-2xl border border-white/20">
            <!-- Header Inside Card -->
            <div class="flex flex-col items-center text-center mb-10">
                <a href="../index.html" class="flex items-center space-x-3 rtl:space-x-reverse group mb-6">
                    <img src="../podlink_logo_icon_1778567690962.png" alt="PodLink Logo" class="w-12 h-12 object-contain group-hover:rotate-12 transition-transform">
                    <span class="text-3xl font-bold gradient-text">PodLink</span>
                </a>
                <h2 class="text-3xl font-black mb-2 text-slate-900 dark:text-white">Join the Network</h2>
                <p class="text-slate-500 dark:text-slate-400">Start your podcast guesting journey today</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Full Name</label>
                    <input type="text" placeholder="John Doe" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Email Address</label>
                    <input type="email" placeholder="john@example.com" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white">
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Expertise Niche</label>
                        <input type="text" placeholder="e.g. AI Strategy" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">LinkedIn Profile</label>
                        <input type="text" placeholder="linkedin.com/in/..." class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white">
                    </div>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Password</label>
                        <div class="relative group">
                            <input type="password" id="regPassword" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white pr-14 rtl:pr-5 rtl:pl-14">
                            <button type="button" onclick="togglePassword('regPassword', this)" class="absolute right-4 rtl:right-auto rtl:left-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-primary transition-colors focus:outline-none">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-2 rtl:text-right">Confirm Password</label>
                        <div class="relative group">
                            <input type="password" id="confirmPassword" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-100 dark:bg-white/5 border border-transparent focus:border-primary rounded-2xl focus:outline-none transition-all dark:text-white pr-14 rtl:pr-5 rtl:pl-14">
                            <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 rtl:right-auto rtl:left-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-primary transition-colors focus:outline-none">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="flex items-start space-x-3 rtl:space-x-reverse cursor-pointer group">
                        <input type="checkbox" required class="mt-1 rounded border-slate-300 text-primary focus:ring-primary">
                        <span class="text-xs text-slate-500 leading-relaxed">
                            I agree to the <a href="#" class="text-primary hover:underline font-bold">Terms of Service</a> and 
                            <a href="#" class="text-primary hover:underline font-bold">Privacy Policy</a>, and consent to receiving podcast outreach updates.
                        </span>
                    </label>
                </div>
                <button type="button" onclick="location.href='dashboard.html'" class="w-full py-5 bg-primary text-white rounded-2xl font-bold shadow-xl shadow-primary/30 hover:bg-opacity-90 transition-all transform hover:scale-[1.01]">Create My Account</button>
            </form>

            <div class="relative flex items-center justify-center my-8">
                <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
                <span class="flex-shrink mx-4 text-xs font-bold uppercase text-slate-400 tracking-widest">or sign up with social</span>
                <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button class="flex items-center justify-center p-4 bg-white dark:bg-white/10 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-100 hover:border-primary/50 dark:hover:bg-white/20 transition-all group">
                    <i class="fab fa-google text-xl text-red-500 dark:text-red-400 group-hover:scale-110 transition-transform"></i>
                </button>
                <button class="flex items-center justify-center p-4 bg-white dark:bg-white/10 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-100 hover:border-primary/50 dark:hover:bg-white/20 transition-all group">
                    <i class="fab fa-facebook text-xl text-blue-600 dark:text-blue-400 group-hover:scale-110 transition-transform"></i>
                </button>
                <button class="flex items-center justify-center p-4 bg-white dark:bg-white/10 border border-slate-200 dark:border-white/10 rounded-2xl hover:bg-slate-100 hover:border-primary/50 dark:hover:bg-white/20 transition-all group">
                    <i class="fab fa-apple text-xl text-black dark:text-white group-hover:scale-110 transition-transform"></i>
                </button>
            </div>

            <div class="mt-10 pt-10 border-t border-slate-200 dark:border-white/5 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">Already a member? <a href="login.html" class="text-primary font-bold hover:underline">Log In Here</a></p>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
